<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Wave Grid</title>
    <style>
        /* Import a premium modern font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Overlay Text styling */
        #overlay-text {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.65);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            text-align: center;
        }

        #overlay-text.fade-out {
            opacity: 0;
        }

        /* Stylized Download GLB Button */
        #download-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 127, 0.5);
            color: #ffffff;
            padding: 11px 22px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.15);
            outline: none;
        }

        #download-btn:hover {
            background: rgba(255, 0, 127, 0.15);
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.45);
            transform: translateY(-2px);
        }

        #download-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="overlay-text">Drag to rotate 360° | Scroll to Zoom In & Out</div>
    <button id="download-btn">Download GLB</button>

    <!-- Load global Three.js via CDNJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Load GLTFExporter from unpkg for ES5 environment -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>

    <script>
        // Grid parameters
        const SEPARATION = 42;
        const AMOUNTX = 120;
        const AMOUNTY = 120;

        let container;
        let camera, scene, renderer;
        let particles, count = 0;
        let material;

        // Custom camera orbiting variables (allows full 360-degree spherical rotation and expanded zoom range)
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationTheta = -0.405; // Starting horizontal rotation angle
        let rotationPhi = 0.945;   // Starting vertical angle
        let radius = 1878;         // Orbit radius (adjustable via zoom)

        // WebGL Shaders for circular particles with neon glow based on height
        const vertexShader = `
            varying float vHeight;
            
            void main() {
                vHeight = position.y;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                // Particle size decreases with distance to create 3D depth perception
                // Enforce a minimum size of 4.5px so particles remain bright and visible when zooming far out
                gl_PointSize = max(4.5, 26.0 * (300.0 / -mvPosition.z));
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying float vHeight;
            
            // Custom Neon Color ramp: Red -> Blue -> Pink -> Green -> Violet
            vec3 getCustomNeonColor(float h) {
                vec3 cRed    = vec3(1.0, 0.0, 0.25); // Neon Red
                vec3 cBlue   = vec3(0.0, 0.35, 1.0); // Neon Blue
                vec3 cPink   = vec3(1.0, 0.0, 0.67); // Neon Hot Pink
                vec3 cGreen  = vec3(0.0, 1.0, 0.35); // Neon Green
                vec3 cViolet = vec3(0.55, 0.0, 1.0); // Neon Violet
                
                if (h < 0.25) {
                    return mix(cRed, cBlue, h / 0.25);
                } else if (h < 0.5) {
                    return mix(cBlue, cPink, (h - 0.25) / 0.25);
                } else if (h < 0.75) {
                    return mix(cPink, cGreen, (h - 0.5) / 0.25);
                } else {
                    return mix(cGreen, cViolet, (h - 0.75) / 0.25);
                }
            }
            
            void main() {
                // Calculate distance from center of the point
                vec2 center = gl_PointCoord - vec2(0.5);
                float dist = length(center);
                
                // Discard pixels outside the point radius
                if (dist > 0.5) {
                    discard;
                }
                
                // Soft radial falloff for glowing neon effect
                float alpha = pow(1.0 - (dist * 2.0), 1.3);
                
                // Normalize height based on wave amplitude (approx range -215 to 215)
                float h = clamp((vHeight + 215.0) / 430.0, 0.0, 1.0);
                vec3 baseColor = getCustomNeonColor(h);
                
                // Boost color intensity for glowing emissive neon look
                vec3 neonColor = baseColor * 2.2;
                
                // Blend to white core at the absolute center to mimic light saturation
                vec3 coreColor = mix(vec3(1.0), neonColor, smoothstep(0.0, 0.15, dist));
                
                gl_FragColor = vec4(coreColor, alpha);
            }
        `;

        init();
        animate();

        function init() {
            container = document.getElementById('canvas-container');

            // 1. Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 2. Camera setup - set initial position via spherical coordinates (far plane increased to 25000 for extreme zoom-out)
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 25000);
            updateCamera();

            // 3. Grid geometry buffer instantiation
            const numParticles = AMOUNTX * AMOUNTY;
            const positions = new Float32Array(numParticles * 3);
            const colors = new Float32Array(numParticles * 3);

            let i = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    // Coordinates centered around (0,0) on the horizontal XZ plane
                    positions[i] = ix * SEPARATION - (AMOUNTX * SEPARATION) / 2;
                    positions[i + 1] = 0; // Y height initialized to 0 (will be updated dynamically)
                    positions[i + 2] = iy * SEPARATION - (AMOUNTY * SEPARATION) / 2;

                    // Initial default colors (will be computed dynamically per-frame in shader based on Y height)
                    colors[i] = 1.0;
                    colors[i + 1] = 1.0;
                    colors[i + 2] = 1.0;

                    i += 3;
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 4. Custom shader material for crisp circles and vibrant glow
            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            // 5. Points system creation
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // 6. WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 7. Interactive Controls (Custom Drag Orbit Handlers)
            const dom = renderer.domElement;
            const overlayText = document.getElementById('overlay-text');

            const startDrag = (x, y) => {
                isDragging = true;
                previousMousePosition = { x, y };
                if (overlayText) {
                    overlayText.classList.add('fade-out');
                }
            };

            const moveDrag = (x, y) => {
                if (!isDragging) return;
                const deltaX = x - previousMousePosition.x;
                const deltaY = y - previousMousePosition.y;

                rotationTheta -= deltaX * 0.005;
                rotationPhi -= deltaY * 0.005;

                // Restrict phi so camera stays within bounds [0.05, PI - 0.05]
                // This allows complete vertical rotation, including looking from below (underneath)
                rotationPhi = Math.max(0.05, Math.min(Math.PI - 0.05, rotationPhi));

                previousMousePosition = { x, y };
                updateCamera();
            };

            const endDrag = () => {
                isDragging = false;
            };

            // Mouse events
            dom.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
            window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
            window.addEventListener('mouseup', endDrag);

            // Zoom via Mouse Wheel (expanded range: max zoom distance increased from 3000 to 7500 for extreme zoom-out option)
            window.addEventListener('wheel', e => {
                radius += e.deltaY * 0.9;
                // Limit zoom distance to allow extreme zoom-out
                radius = Math.max(300, Math.min(7500, radius));
                updateCamera();
                if (overlayText) {
                    overlayText.classList.add('fade-out');
                }
            });

            // Touch events for mobile support
            let touchStartDist = 0;
            dom.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    startDrag(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    // Start pinch zoom
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDist = Math.sqrt(dx * dx + dy * dy);
                }
            });
            
            window.addEventListener('touchmove', e => {
                if (e.touches.length === 1 && isDragging) {
                    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    // Update pinch zoom
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const factor = dist - touchStartDist;
                    radius -= factor * 2.5;
                    radius = Math.max(300, Math.min(7500, radius));
                    touchStartDist = dist;
                    updateCamera();
                }
            });
            window.addEventListener('touchend', endDrag);

            // Bind GLB download trigger
            document.getElementById('download-btn').addEventListener('click', exportToGLB);

            // 8. Event listener for window resizing
            window.addEventListener('resize', onWindowResize);
        }

        function updateCamera() {
            camera.position.x = radius * Math.sin(rotationPhi) * Math.sin(rotationTheta);
            camera.position.y = radius * Math.cos(rotationPhi);
            camera.position.z = radius * Math.sin(rotationPhi) * Math.cos(rotationTheta);
            camera.lookAt(0, 0, 0);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Export active particle wave snapshot as a standard GLB point cloud
        function exportToGLB() {
            const btn = document.getElementById('download-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Exporting...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Generate colors buffer directly for GLTF exporter (since glTF PointsMaterial doesn't compile shaders,
            // we must bake the neon wave colors into the geometry's color attribute for the GLB file)
            const positions = particles.geometry.attributes.position.array;
            const colors = particles.geometry.attributes.color.array;
            
            // Helper function matching the shader color ramp in JS
            function getCustomNeonColorJS(h) {
                const cRed    = new THREE.Color(0xff0040);
                const cBlue   = new THREE.Color(0x0059ff);
                const cPink   = new THREE.Color(0xff00ab);
                const cGreen  = new THREE.Color(0x00ff59);
                const cViolet = new THREE.Color(0x8c00ff);
                
                const lerpColor = new THREE.Color();
                if (h < 0.25) {
                    return lerpColor.copy(cRed).lerp(cBlue, h / 0.25);
                } else if (h < 0.5) {
                    return lerpColor.copy(cBlue).lerp(cPink, (h - 0.25) / 0.25);
                } else if (h < 0.75) {
                    return lerpColor.copy(cPink).lerp(cGreen, (h - 0.5) / 0.25);
                } else {
                    return lerpColor.copy(cGreen).lerp(cViolet, (h - 0.75) / 0.25);
                }
            }

            // Bake current dynamic wave colors into the colors buffer
            let j = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    const y = positions[j + 1];
                    const h = Math.max(0.0, Math.min(1.0, (y + 215.0) / 430.0));
                    const col = getCustomNeonColorJS(h);
                    colors[j] = col.r;
                    colors[j + 1] = col.g;
                    colors[j + 2] = col.b;
                    j += 3;
                }
            }
            particles.geometry.attributes.color.needsUpdate = true;

            // GLTFExporter doesn't support custom ShaderMaterial. We temporarily swap it 
            // to a standard PointsMaterial with vertexColors enabled during export.
            const tempMaterial = new THREE.PointsMaterial({
                size: 15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            // Assign standard material
            particles.material = tempMaterial;

            const exporter = new THREE.GLTFExporter();
            exporter.parse(particles, function (result) {
                // Restore custom shader material
                particles.material = material;
                
                // Trigger download of binary GLB file
                const blob = new Blob([result], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'neon-particle-wave.glb';
                link.click();

                // Reset button state
                btn.textContent = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }, function (error) {
                // Restore material in case of error
                particles.material = material;
                console.error('Error exporting GLTF/GLB:', error);
                alert('Export failed: ' + error.message);
                
                btn.textContent = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }, {
                binary: true // Generate a self-contained binary .glb file
            });
        }

        // Animation / Render loop
        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const positions = particles.geometry.attributes.position.array;
            
            // Rhythmic time step increment
            count += 0.022;

            let i = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    // Spatial frequencies (tweak coefficients to change wave density)
                    const u = ix * 0.072;
                    const v = iy * 0.072;

                    // Organic multi-sine combination wave equation
                    const y = (Math.sin(u + count) * 85) + 
                              (Math.cos(v + count * 1.1) * 85) + 
                              (Math.sin((u + v) * 0.75 + count * 1.45) * 45);
                    
                    positions[i + 1] = y;
                    i += 3;
                }
            }

            // Flag points coordinates to be uploaded to GPU
            particles.geometry.attributes.position.needsUpdate = true;

            // Slow, automatic rotation when user is idle
            if (!isDragging) {
                rotationTheta += 0.0012;
                updateCamera();
            }

            // Render scene
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
